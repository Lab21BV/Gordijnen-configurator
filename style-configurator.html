<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Style Engine — Interieur-configurator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f4f5f7;
      --surface:   #ffffff;
      --border:    #d9dde8;
      --accent:    #2c5f8a;
      --accent-lt: #e8f0f8;
      --accent-dk: #1e4166;
      --success:   #2e7d32;
      --success-lt:#e7f5e8;
      --error:     #c62828;
      --error-lt:  #fde8e8;
      --warn:      #e65100;
      --warn-lt:   #fff3e0;
      --text:      #1a1a2e;
      --muted:     #5a6072;
      --radius:    10px;
      --shadow:    0 2px 8px rgba(0,0,0,.10);
      --shadow-lg: 0 6px 24px rgba(20,30,60,.16);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      background: var(--accent); color: #fff; padding: 14px 28px;
      display: flex; align-items: center; gap: 14px;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
      position: sticky; top: 0; z-index: 100;
    }
    header svg { flex-shrink: 0; }
    header h1 { font-size: 1.15rem; font-weight: 600; letter-spacing: .02em; }
    header nav { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; }
    header nav a {
      color: rgba(255,255,255,.85); text-decoration: none; font-size: .82rem;
      font-weight: 500; padding: 5px 12px; border-radius: 5px;
      border: 1px solid rgba(255,255,255,.3); transition: background .15s;
    }
    header nav a:hover { background: rgba(255,255,255,.15); color: #fff; }

    .page { max-width: 1100px; margin: 0 auto; padding: 28px 24px 80px; }

    /* ── Voortgangsbalk ─────────────────────────────────────── */
    .progress-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 22px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }
    .progress-row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
      margin-bottom: 12px;
    }
    /* Stap 5 wordt visueel afgezwakt als hij niet in scope zit. */
    .progress-step.skipped { opacity: .35; }
    .progress-step.skipped .num { background: #eef0f4; color: var(--muted); }
    .progress-step {
      display: flex; align-items: center; gap: 8px;
      font-size: .82rem; color: var(--muted); min-width: 0;
    }
    .progress-step .num {
      flex-shrink: 0;
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; font-size: .78rem; font-weight: 700;
      background: #eef0f4; color: var(--muted);
      border: 2px solid transparent;
      transition: all .25s;
    }
    .progress-step .label {
      font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .progress-step.active .num    { background: var(--accent); color: #fff; transform: scale(1.06); }
    .progress-step.active .label  { color: var(--accent-dk); }
    .progress-step.done .num      { background: var(--success); color: #fff; }
    .progress-step.done .label    { color: var(--success); }
    .progress-bar {
      height: 6px;
      background: #eef0f4;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-bar .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #4a8bc2);
      width: 0%;
      transition: width .35s ease;
    }

    .luck-bar {
      display: flex; justify-content: flex-end; align-items: center;
      gap: 10px; margin-bottom: 12px; font-size: .78rem; color: var(--muted);
    }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: inherit; font-size: .82rem; font-weight: 600;
      padding: 8px 14px; border-radius: 6px; cursor: pointer;
      border: 1px solid transparent; transition: all .15s; line-height: 1.2;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dk); }
    .btn-primary:disabled { background: #bcc4d2; cursor: not-allowed; }
    .btn-outline { background: transparent; color: var(--accent); border-color: var(--accent); }
    .btn-outline:hover { background: var(--accent-lt); }
    .btn-ghost { background: transparent; color: var(--muted); }
    .btn-ghost:hover { background: var(--accent-lt); color: var(--accent-dk); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover { background: #1f5d23; }
    .btn-lg { padding: 11px 20px; font-size: .9rem; }

    /* ── Stap-card ──────────────────────────────────────────── */
    .step {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px 28px 28px;
      animation: fadeIn .35s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .step-eyebrow {
      font-size: .72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .12em; color: var(--accent);
      margin-bottom: 6px;
    }
    .step-title {
      font-size: 1.6rem; font-weight: 700; color: var(--accent-dk);
      margin-bottom: 8px;
    }
    .step-lead {
      color: var(--muted); font-size: .95rem;
      max-width: 640px; margin-bottom: 28px;
    }
    .step-actions {
      margin-top: 28px;
      display: flex; gap: 10px; align-items: center; justify-content: space-between;
      flex-wrap: wrap;
    }

    /* ── Tile-grid (visuele keuze) ──────────────────────────── */
    .tiles {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }
    .tile {
      position: relative;
      cursor: pointer;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform .2s, box-shadow .2s, border-color .2s;
      display: flex; flex-direction: column;
    }
    .tile:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
      border-color: var(--accent);
    }
    .tile.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-lt), var(--shadow-lg);
    }
    .tile.selected::after {
      content: '✓';
      position: absolute; top: 10px; right: 10px;
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--accent); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 700;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
    }
    .tile-image {
      aspect-ratio: 4 / 3;
      width: 100%;
      position: relative;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    /* Each .tile-image renders a CSS-gradient placeholder. The SVG inside acts
       as a "mood icon". ── REPLACE: vervang de inline <svg> of de
       background door <img src="…/showroomfoto.jpg" alt=""> met je eigen
       showroomfoto's voor extra impact. ── */
    .tile-image svg {
      width: 64%; height: 64%;
      filter: drop-shadow(0 3px 6px rgba(0,0,0,.18));
    }
    .tile-body {
      padding: 14px 16px 18px;
      display: flex; flex-direction: column; gap: 4px;
      flex: 1;
    }
    .tile-title {
      font-size: 1.02rem; font-weight: 700; color: var(--accent-dk);
    }
    .tile-sub {
      font-size: .82rem; color: var(--muted); line-height: 1.45;
    }

    /* ── Tile-backgrounds (placeholders, makkelijk te vervangen) ── */
    .bg-industrial      { background: linear-gradient(135deg,#5a4938 0%,#2e2a26 50%,#15110f 100%); }
    .bg-scandinavian    { background: linear-gradient(135deg,#fafafa 0%,#e9ecef 60%,#cdd2d8 100%); }
    .bg-modern          { background: linear-gradient(135deg,#dadde2 0%,#a8b0bd 60%,#6c7480 100%); }
    .bg-country         { background: linear-gradient(135deg,#e8d5a8 0%,#c8a571 50%,#8a6438 100%); }

    .bg-warm-earth      { background: linear-gradient(135deg,#fbeacb 0%,#e3c79b 50%,#ad8456 100%); }
    .bg-cool-fresh      { background: linear-gradient(135deg,#f3f5f8 0%,#c8d0db 60%,#7e8a9c 100%); }
    .bg-bold-contrast   { background: linear-gradient(135deg,#3a3d44 0%,#1c1e23 50%,#0a0c10 100%); }
    .bg-natural-green   { background: linear-gradient(135deg,#d3dfa8 0%,#7d9461 50%,#3e5430 100%); }

    .icon-light    { color: rgba(255,255,255,.92); }
    .icon-dark     { color: rgba(0,0,0,.65); }

    /* Tiles die door filtering NIET passen worden subtiel afgezwakt. */
    .tile.dimmed {
      opacity: .35;
      filter: grayscale(.6);
      pointer-events: none;
    }

    /* ── Foto-upload ────────────────────────────────────────── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      background: #fafbfd;
      padding: 36px 20px;
      text-align: center;
      transition: border-color .2s, background .2s;
      cursor: pointer;
      position: relative;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent);
      background: var(--accent-lt);
    }
    .upload-zone input[type="file"] { display: none; }
    .upload-zone .icon {
      font-size: 2.6rem; margin-bottom: 10px; line-height: 1;
    }
    .upload-zone .title {
      font-size: 1.05rem; font-weight: 700; color: var(--accent-dk);
      margin-bottom: 4px;
    }
    .upload-zone .hint {
      font-size: .82rem; color: var(--muted);
    }

    .photo-preview {
      margin-top: 18px;
      display: grid;
      grid-template-columns: minmax(200px, 1fr) 2fr;
      gap: 18px;
      align-items: start;
    }
    .photo-preview img {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .photo-meta {
      font-size: .85rem; color: var(--muted);
      background: #fafbfd; border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px;
    }
    .photo-meta b { color: var(--text); }
    .photo-meta .row { display: flex; justify-content: space-between; padding: 3px 0; }

    @media (max-width: 720px) {
      .photo-preview { grid-template-columns: 1fr; }
    }

    /* ── Style profile output ──────────────────────────────── */
    .profile-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin: 22px 0 18px;
    }
    .profile-item {
      background: var(--accent-lt);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
    }
    .profile-item .lbl {
      font-size: .68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--accent); margin-bottom: 3px;
    }
    .profile-item .val {
      font-size: 1.05rem; font-weight: 700; color: var(--accent-dk);
    }
    .profile-item .sub {
      font-size: .76rem; color: var(--muted);
    }

    pre.json-out {
      background: #0f1320;
      color: #e6e9ef;
      padding: 18px 20px;
      border-radius: 8px;
      font-family: 'Courier New', Consolas, monospace;
      font-size: .82rem;
      line-height: 1.55;
      overflow-x: auto;
      max-height: 380px;
      overflow-y: auto;
    }
    pre.json-out .k  { color: #82b8ff; }
    pre.json-out .s  { color: #d8a76a; }
    pre.json-out .n  { color: #b1cf85; }
    pre.json-out .b  { color: #ce9178; }

    .copy-row {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-top: 12px;
    }
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: var(--accent-dk); color: #fff;
      padding: 10px 18px; border-radius: 6px;
      box-shadow: var(--shadow-lg);
      font-size: .85rem; font-weight: 600;
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
      z-index: 200;
    }
    .toast.show { opacity: 1; }

    .ai-suggest-banner {
      background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
      border: 1px solid #ffcc80;
      color: #7b3a00;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: .85rem;
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 10px;
    }

    /* ── Meubel-inventarisatie ──────────────────────────── */
    .furniture-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 14px; }
    .furniture-item {
      display: grid;
      grid-template-columns: 110px 1fr auto;
      gap: 14px; align-items: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px;
    }
    .furniture-thumb {
      width: 110px; height: 80px; border-radius: 6px;
      background: linear-gradient(135deg,#eef0f4,#dadde2);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 1.6rem; overflow: hidden; cursor: pointer;
      position: relative;
    }
    .furniture-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .furniture-thumb input { display: none; }
    .furniture-fields {
      display: grid;
      grid-template-columns: 1fr repeat(3, 80px);
      gap: 8px; align-items: end;
    }
    .furniture-fields label {
      font-size: .72rem; font-weight: 600; color: var(--muted);
      display: flex; flex-direction: column; gap: 3px;
    }
    .furniture-fields input, .furniture-fields select {
      font: inherit; padding: 6px 8px; border: 1px solid var(--border);
      border-radius: 5px; font-size: .85rem; background: #fff; color: var(--text);
    }
    .furniture-remove {
      background: transparent; border: 1px solid var(--border);
      color: var(--error); border-radius: 5px; padding: 6px 10px;
      cursor: pointer; font-size: .82rem;
    }
    .furniture-remove:hover { background: var(--error-lt); border-color: var(--error); }
    .commerce-bias {
      background: var(--accent-lt); border: 1px solid #c4d4e6;
      color: var(--accent-dk); padding: 11px 14px; border-radius: 8px;
      font-size: .85rem; margin-bottom: 16px;
    }
    @media (max-width: 720px) {
      .furniture-item { grid-template-columns: 1fr; }
      .furniture-fields { grid-template-columns: 1fr 1fr; }
    }

    /* ── Scope tile-grid (3 grote tegels) ────────────────── */
    .scope-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }

    /* ── Raam-card (per ruimte, per raam) ────────────────── */
    .room-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; box-shadow: var(--shadow);
      padding: 18px 20px; margin-bottom: 16px;
    }
    .room-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
    }
    .room-header .badge {
      background: var(--accent); color: #fff; font-size: .72rem;
      font-weight: 700; padding: 3px 9px; border-radius: 12px;
      letter-spacing: .04em; text-transform: uppercase;
    }
    .room-header h3 { font-size: 1.05rem; color: var(--accent-dk); flex: 1; }
    .field-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px 14px; margin-bottom: 14px;
    }
    .field-grid label {
      font-size: .76rem; font-weight: 600; color: var(--muted);
      display: flex; flex-direction: column; gap: 4px;
    }
    .field-grid input, .field-grid select {
      font: inherit; padding: 7px 9px; border: 1px solid var(--border);
      border-radius: 5px; font-size: .85rem; background: #fff; color: var(--text);
    }

    /* ── Doel-klant chips (multi-select) ─────────────────── */
    .goal-chips {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-bottom: 14px;
    }
    .goal-chip {
      cursor: pointer; user-select: none;
      font-size: .78rem; font-weight: 600;
      padding: 6px 12px; border-radius: 18px;
      background: #f4f5f7; border: 1px solid var(--border);
      color: var(--muted); transition: all .15s;
    }
    .goal-chip:hover { border-color: var(--accent); color: var(--accent-dk); }
    .goal-chip.active {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }

    /* ── Top-4 oplossing tegels ──────────────────────────── */
    .top4-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px; margin-bottom: 14px;
    }
    .top4-tile {
      cursor: pointer;
      background: var(--surface); border: 2px solid var(--border);
      border-radius: 8px; padding: 12px 14px;
      transition: border-color .15s, box-shadow .15s;
    }
    .top4-tile:hover { border-color: var(--accent); box-shadow: var(--shadow); }
    .top4-tile.selected {
      border-color: var(--success);
      box-shadow: 0 0 0 3px var(--success-lt);
    }
    .top4-tile .combo {
      font-size: .92rem; font-weight: 700; color: var(--accent-dk);
      margin-bottom: 4px;
    }
    .top4-tile .goals {
      font-size: .72rem; color: var(--muted); line-height: 1.4;
    }
    .top4-tile .kapstaal {
      margin-top: 8px; font-family: 'Courier New', monospace;
      font-size: .7rem; color: var(--accent);
      background: var(--accent-lt); padding: 2px 6px; border-radius: 3px;
      display: inline-block;
    }
    .top4-empty {
      padding: 14px; text-align: center; color: var(--muted);
      font-size: .85rem; background: #fafbfd; border: 1px dashed var(--border);
      border-radius: 6px; margin-bottom: 14px;
    }

    /* ── Notice (auto-waarschuwingen op basis van keuzes) ── */
    .notice {
      display: flex; align-items: flex-start; gap: 8px;
      background: var(--warn-lt); border: 1px solid #ffcc80;
      color: #7b3a00; padding: 9px 12px; border-radius: 6px;
      font-size: .8rem; margin-bottom: 8px; line-height: 1.45;
    }
    .notice .icon { font-size: 1rem; line-height: 1.2; flex-shrink: 0; }

    /* ── Advanced (collapsible) ──────────────────────────── */
    details.advanced {
      margin-top: 8px; border-top: 1px dashed var(--border);
      padding-top: 10px;
    }
    details.advanced > summary {
      cursor: pointer; font-size: .82rem; font-weight: 600;
      color: var(--accent); user-select: none;
      list-style: none; padding: 4px 0;
    }
    details.advanced > summary::-webkit-details-marker { display: none; }
    details.advanced > summary::before {
      content: '▸'; display: inline-block; margin-right: 6px;
      transition: transform .15s;
    }
    details.advanced[open] > summary::before { transform: rotate(90deg); }

    .add-btn {
      width: 100%; padding: 10px;
      border: 2px dashed var(--border); background: transparent;
      color: var(--muted); border-radius: 8px; cursor: pointer;
      font-size: .9rem; font-weight: 600; transition: all .15s;
    }
    .add-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Plattegrond / bouwtekening upload (top of page) ── */
    .plan-upload {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 14px;
      flex-wrap: wrap;
      transition: border-color .15s, background .15s;
    }
    .plan-upload.dragover { border-color: var(--accent); background: var(--accent-lt); }
    .plan-upload.has-file { border-color: var(--success); background: var(--success-lt); }
    .plan-upload .pu-icon { font-size: 1.6rem; flex-shrink: 0; }
    .plan-upload .pu-thumb {
      width: 56px; height: 48px; border-radius: 5px;
      border: 1px solid var(--border); background: #f4f5f7;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; overflow: hidden; flex-shrink: 0;
    }
    .plan-upload .pu-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .plan-upload .pu-text { flex: 1; min-width: 200px; }
    .plan-upload .pu-title { font-size: .92rem; font-weight: 700; color: var(--accent-dk); margin-bottom: 2px; }
    .plan-upload .pu-sub   { font-size: .78rem; color: var(--muted); line-height: 1.45; }
    .plan-upload.has-file .pu-title { color: #1b5e20; }
    .plan-upload .pu-actions { display: flex; gap: 6px; align-items: center; }
    .plan-upload .pu-actions label { cursor: pointer; }
    .plan-upload input[type="file"] { display: none; }

    /* ── Afsluitende boodschap ───────────────────────────── */
    .final-note {
      margin-top: 24px;
      padding: 18px 22px;
      background: linear-gradient(135deg, var(--success-lt) 0%, #d8efdb 100%);
      border: 1px solid #a5d6a7;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(46,125,50,.15);
      display: flex; align-items: flex-start; gap: 14px;
      animation: fadeIn .4s ease;
    }
    .final-note-icon {
      font-size: 1.6rem; line-height: 1;
      flex-shrink: 0;
    }
    .final-note-title {
      font-size: 1.02rem; font-weight: 700;
      color: #1b5e20;
      margin-bottom: 4px;
    }
    .final-note-body {
      font-size: .9rem;
      color: #2e5b32;
      line-height: 1.5;
    }

    /* Smaller mobile tweaks. */
    @media (max-width: 540px) {
      .step { padding: 22px 18px 18px; }

// ── Filter-functie voor de oplossingen-matrix ───────────────

// @returns sorted RAAM_OPLOSSINGEN: alleen combinaties die ALLE
//          geselecteerde doelen afdekken; meest veelzijdig eerst.
//
// TypeScript-equivalent voor AI-pipeline:
//   function filterRaamOplossingen(selectedGoals: string[]): RaamOplossing[]
function filterRaamOplossingen(selectedGoals) {
  if (!selectedGoals || selectedGoals.length === 0) {
    // Geen doelen → toon alle, gesorteerd op veelzijdigheid (meest gedekte doelen).
    return [...RAAM_OPLOSSINGEN].sort((a, b) => b.goals.length - a.goals.length);
  }
  return RAAM_OPLOSSINGEN
    .filter(o => selectedGoals.every(g => o.goals.includes(g)))
    .sort((a, b) => b.goals.length - a.goals.length);
}

// Genereer een Kapstalen-ID voor de showroom: STYLE-PALETTE-PRODUCTCODES-NR.
// Voorbeeld: KAP-IND-WE-INB-OG-DUE-001
function generateKapstalenId(styleId, paletteId, comboId, idx = 1) {
  const STY = (styleId || '???').slice(0, 3).toUpperCase();
  const PAL = (paletteId || '??').split('_').map(s => s[0]).join('').toUpperCase();
  const oplossing = RAAM_OPLOSSINGEN.find(o => o.id === comboId);
  const productCodes = oplossing
    ? oplossing.combo.map(p => PRODUCT_LABELS[p]?.code || p.toUpperCase().slice(0,3)).join('-')
    : '___';
  return `KAP-${STY}-${PAL}-${productCodes}-${String(idx).padStart(3, '0')}`;
}

// ── Rendering helpers ──────────────────────────────────────
function $(sel) { return document.querySelector(sel); }
function el(tag, attrs = {}, html = '') {
  const n = document.createElement(tag);
  Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'class') n.className = v;
    else if (k.startsWith('on')) n.addEventListener(k.slice(2), v);
    else n.setAttribute(k, v);
  });
  if (html) n.innerHTML = html;
  return n;
}
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Plattegrond / bouwtekening upload (gedeeld pattern) ─────
// Compacte component bovenaan de pagina. Accepteert JPG/PNG/WEBP en PDF;
// slaat het bestand als base64 op in state.floorPlanDataUrl. Geen blokkade
// voor de stappen-flow — puur context voor de adviseur.
function setupPlanUpload() {
  const card = document.getElementById('planUpload');
  if (!card) return;
  ['dragenter','dragover'].forEach(ev =>
    card.addEventListener(ev, e => { e.preventDefault(); card.classList.add('dragover'); }));
  ['dragleave','drop'].forEach(ev =>
    card.addEventListener(ev, e => { e.preventDefault(); card.classList.remove('dragover'); }));
  card.addEventListener('drop', e => {
    if (e.dataTransfer.files.length) handleFloorPlan(e.dataTransfer.files[0]);
  });
  card.addEventListener('change', e => {
    if (e.target.matches('input[type="file"]') && e.target.files.length)
      handleFloorPlan(e.target.files[0]);
  });
  card.addEventListener('click', e => {
    if (e.target.id === 'planRemove') {
      state.floorPlanFile = null;
      state.floorPlanDataUrl = null;
      renderPlanUpload();
    }
  });
  renderPlanUpload();
}

function handleFloorPlan(file) {
  const isImage = file.type.startsWith('image/');
  const isPdf   = file.type === 'application/pdf';
  if (!isImage && !isPdf) {
    alert('Kies een afbeelding (JPG/PNG/WEBP) of een PDF.');
    return;
  }
  const MAX = 8 * 1024 * 1024;
  if (file.size > MAX && !confirm(`Plattegrond is ${(file.size/1024/1024).toFixed(1)} MB — base64 wordt erg groot. Toch insluiten?`)) return;
  const r = new FileReader();
  r.onload = ev => {
    state.floorPlanFile = file;
    state.floorPlanDataUrl = ev.target.result;
    renderPlanUpload();
  };
  r.readAsDataURL(file);
}

function renderPlanUpload() {
  const card = document.getElementById('planUpload');
  if (!card) return;
  if (!state.floorPlanFile) {
    card.classList.remove('has-file');
    card.innerHTML = `
      <span class="pu-icon">📐</span>
      <div class="pu-text">
        <div class="pu-title">Plattegrond of bouwtekening (optioneel)</div>
        <div class="pu-sub">Upload een PDF of afbeelding — wij rekenen oppervlakte en maten voor je uit. Sleep het bestand hierheen of kies het hieronder.</div>
      </div>

        <label class="btn btn-outline btn-sm">📎 Bestand kiezen
          <input type="file" accept="image/*,application/pdf">
        </label>
      </div>`;
    return;
  }
  const f = state.floorPlanFile;
  const sizeMB = (f.size/1024/1024).toFixed(2);
  const isImg = f.type.startsWith('image/');
  card.classList.add('has-file');
  card.innerHTML = `
    <div class="pu-thumb">${isImg ? `<img src="${escHtml(state.floorPlanDataUrl)}" alt="">` : '📄'}</div>
    <div class="pu-text">
      <div class="pu-title">${escHtml(f.name)} ✓</div>
      <div class="pu-sub">${escHtml(sizeMB)} MB · ${escHtml(f.type || 'onbekend')} · wordt meegestuurd in het profiel voor handmatige berekening.</div>
    </div>
    <div class="pu-actions">
      <label class="btn btn-outline btn-sm">Vervang
        <input type="file" accept="image/*,application/pdf">
      </label>
      <button class="btn btn-ghost btn-sm" type="button" id="planRemove">Verwijder</button>
    </div>`;
}

// Voortgangsbalk synchroniseren met state.step. Stap 5 (raamdecor) wordt
// gemarkeerd als 'skipped' wanneer de scope alleen vloer is.
function renderProgress() {
  const total = 6;
  $('#progressFill').style.width = ((state.step - 1) / (total - 1) * 100) + '%';
  // Stap 5 wordt overgeslagen als de scope is gezet (≥1) en window_decor er
  // niet bij zit. Bij niet-gezet scope blijft stap 5 in beeld als 'gewone'
  // toekomstige stap.
  const skipStep5 = state.projectScope.length > 0 && !scopeIncludesWindowDecor();
  document.querySelectorAll('.progress-step').forEach(node => {
    const n = parseInt(node.dataset.step, 10);
    node.classList.toggle('active',  n === state.step);
    node.classList.toggle('done',    n < state.step);
    node.classList.toggle('skipped', n === 5 && skipStep5);
  });
}

// Tile bouwen voor stijl/palet/materiaal — gedeelde renderer.
function renderTile(item, opts = {}) {
  const { selected, dimmed, onClick } = opts;
  const tile = el('button', {
    type: 'button',
    class: `tile ${selected ? 'selected' : ''} ${dimmed ? 'dimmed' : ''}`,
    'aria-pressed': selected ? 'true' : 'false',
    'data-id': item.id,
  });
  tile.style.textAlign = 'left';
  tile.innerHTML = `
    <!-- IMAGE-PLACEHOLDER ${escHtml(item.id)} — vervang door <img src="…" alt=""> voor showroomfoto -->
    <div class="tile-image ${item.bgClass}">
      <span class="${item.iconColor}">${ICONS[item.id] || ''}</span>
    </div>
    <div class="tile-body">
      <div class="tile-title">${escHtml(item.label)}</div>
      <div class="tile-sub">${escHtml(item.sub)}</div>
    </div>`;
  if (onClick) tile.addEventListener('click', () => onClick(item));
  return tile;
}

// ── STAP 1 — Woonstijl ─────────────────────────────────────
function renderStep1() {
  const host = $('#stepHost');
  host.innerHTML = '';
  const card = el('div', { class: 'step' });
  card.innerHTML = `
    <div class="step-eyebrow">Stap 1 van 6</div>
    <h2 class="step-title">Welke sfeer voelt als thuis?</h2>
    <p class="step-lead">Kies wat je hart raakt — niet wat je <em>zou moeten</em> kiezen.
       Op basis van deze richting filteren we het kleurpalet dat echt bij je past.</p>
    <div class="tiles" id="tilesStep1"></div>
    <div class="step-actions">
      <span style="font-size:.78rem;color:var(--muted)">Klik op een sfeer om verder te gaan.</span>
    </div>`;
  host.appendChild(card);
  const grid = card.querySelector('#tilesStep1');
  STYLES.forEach(s => {
    grid.appendChild(renderTile(s, {
      selected: state.style === s.id,
      onClick: chosen => {
        // Reset palet wanneer een andere stijl gekozen wordt — anders blijft
        // een palet hangen dat misschien niet meer past bij de nieuwe stijl.
        if (state.style !== chosen.id) state.palette = null;
        state.style = chosen.id;
        gotoStep(2);
      },
    }));
  });
}

// ── STAP 2 — Kleur-palet (gefilterd op stijl) ──────────────
function renderStep2() {
  const host = $('#stepHost');
  host.innerHTML = '';
  const styleObj = styleById(state.style);
  const allowed = STYLE_PALETTES[state.style] || PALETTES.map(p => p.id);

  const card = el('div', { class: 'step' });
  card.innerHTML = `
    <div class="step-eyebrow">Stap 2 van 6 · ${escHtml(styleObj.label)}</div>
    <h2 class="step-title">Welk palet spreekt je aan?</h2>
    <p class="step-lead">Bij <strong>${escHtml(styleObj.label.toLowerCase())}</strong> tonen we de kleurfamilies die het beste werken.
       Andere paletten blijven mogelijk, maar zijn afgezwakt — vertrouw op je eerste reactie.</p>
    <div class="tiles" id="tilesStep2"></div>
    <div class="step-actions">
      <button class="btn btn-ghost" type="button" id="back2">← Andere stijl kiezen</button>
      <span style="font-size:.78rem;color:var(--muted)">Klik op een palet om verder te gaan.</span>
    </div>`;
  host.appendChild(card);

  const grid = card.querySelector('#tilesStep2');
  // Eerst de toegelaten paletten in de gegeven volgorde, daarna afgezwakt de rest.
  const ordered = [
    ...allowed.map(id => paletteById(id)),
    ...PALETTES.filter(p => !allowed.includes(p.id)),
  ];
  ordered.forEach(p => {
    const isAllowed = allowed.includes(p.id);
    grid.appendChild(renderTile(p, {
      selected: state.palette === p.id,
      dimmed: !isAllowed,
      onClick: chosen => {
        if (!allowed.includes(chosen.id)) return;
        state.palette = chosen.id;
        gotoStep(3);
      },
    }));
  });
  card.querySelector('#back2').addEventListener('click', () => gotoStep(1));
}

// Optionele lijst van meubels die de klant wil behouden. Foto + LxBxH
// helpen de AI in stap 6 om bestaande items in de transformatie te ontzien.

      💡 <strong>Tip:</strong> hoe scherper de afmetingen, hoe beter de adviseur de

// Render alleen de meubel-lijst (sub-render zodat we niet de hele step
// opnieuw hoeven op te bouwen bij add/remove).
function renderFurnitureList() {
  const host = document.getElementById('furnitureList');
  if (!host) return;
  if (state.furniture.length === 0) {
    host.innerHTML = '<div class="top4-empty">Nog geen meubels toegevoegd. Klik hieronder om er één toe te voegen, of ga verder zonder.</div>';
    return;
  }
  host.innerHTML = '';
  state.furniture.forEach(f => {
    const item = el('div', { class: 'furniture-item' });
    item.innerHTML = `
      <label class="furniture-thumb" data-id="${escHtml(f.id)}">
        ${f.photoUrl
          ? `<img src="${escHtml(f.photoUrl)}" alt="${escHtml(f.type)}">`
          : '📦'}
        <input type="file" accept="image/*" />
      </label>
      <div class="furniture-fields">
        <label>Type
          <select data-field="type">
            ${MEUBEL_TYPES.map(t => `<option ${f.type === t ? 'selected' : ''}>${escHtml(t)}</option>`).join('')}
          </select>
        </label>
        <label>L (cm)<input type="number" min="0" step="1" value="${escHtml(f.l)}" data-field="l" /></label>
        <label>B (cm)<input type="number" min="0" step="1" value="${escHtml(f.w)}" data-field="w" /></label>
        <label>H (cm)<input type="number" min="0" step="1" value="${escHtml(f.h)}" data-field="h" /></label>
      </div>
      <button class="furniture-remove" type="button" data-action="remove">Verwijder</button>`;
    // Field updates.
    item.querySelectorAll('[data-field]').forEach(input => {
      input.addEventListener('change', e => {
        f[e.target.dataset.field] = e.target.value;
      });
    });
    // Photo upload.
    const photoInput = item.querySelector('.furniture-thumb input');
    photoInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => { f.photoUrl = ev.target.result; renderFurnitureList(); };
      reader.readAsDataURL(file);
    });
    item.querySelector('[data-action="remove"]').addEventListener('click', () => {
      removeFurniture(f.id);
      renderFurnitureList();
    });
    host.appendChild(item);
  });
}

// ── STAP 4 — Project scope (MULTI-select) ──────────────────
// De gebruiker kan één of meerdere transformatie-zones aanvinken. Stap 5
// is alleen relevant wanneer 'window_decor' geselecteerd is.
function renderStep4() {
  const host = $('#stepHost');
  host.innerHTML = '';

  const card = el('div', { class: 'step' });
  card.innerHTML = `
    <div class="step-eyebrow">Stap 4 van 6 · Productselectie</div>
    <h2 class="step-title">Wat wil je laten transformeren?</h2>
    <p class="step-lead">Kies <strong>één of meerdere</strong> zones waar de adviseur op mag focussen.
       Hoe meer zones je aanvinkt, hoe vollediger de visualisatie.</p>
    <div class="tiles scope-grid" id="tilesStep4"></div>
    <div class="step-actions">
      <button class="btn btn-ghost"   type="button" id="back4">← Meubels aanpassen</button>
      <button class="btn btn-primary btn-lg" type="button" id="next4" disabled>Volgende →</button>
    </div>
    <div style="font-size:.78rem;color:var(--muted);text-align:right;margin-top:6px" id="scopeHint">
      Selecteer minimaal één scope om verder te gaan.
    </div>`;
  host.appendChild(card);

  const grid    = card.querySelector('#tilesStep4');
  const nextBtn = card.querySelector('#next4');
  const hint    = card.querySelector('#scopeHint');

  function refreshSelection() {
    Array.from(grid.children).forEach(node => {
      const id = node.dataset.id;
      node.classList.toggle('selected', state.projectScope.includes(id));
    });
    nextBtn.disabled = state.projectScope.length === 0;
    hint.textContent = state.projectScope.length === 0
      ? 'Selecteer minimaal één scope om verder te gaan.'
      : `${state.projectScope.length} scope(s) geselecteerd — klik op Volgende.`;
  }

  PROJECT_SCOPES.forEach(s => {
    grid.appendChild(renderTile(s, {
      selected: state.projectScope.includes(s.id),
      onClick: chosen => {
        // Toggle de scope; minstens één blijft de eis voor doorgaan.
        if (state.projectScope.includes(chosen.id)) {
          state.projectScope = state.projectScope.filter(s => s !== chosen.id);
        } else {
          state.projectScope = [...state.projectScope, chosen.id];
        }
        // Default raam aanmaken zodra raamdecor erbij komt.
        if (scopeIncludesWindowDecor() && state.windows.length === 0) addWindow();
        refreshSelection();
      },
    }));
  });
  refreshSelection();

  card.querySelector('#back4').addEventListener('click', () => gotoStep(3));
  nextBtn.addEventListener('click', () => {
    // Skip stap 5 als raamdecor niet in scope zit.
    gotoStep(scopeIncludesWindowDecor() ? 5 : 6);
  });
}

function renderStep5() {
  const host = $('#stepHost');

// Sub-render: de lijst van raam-cards. We re-renderen alleen deze zodat
// open <details> en focus-state in andere stappen behouden blijven.
function renderWindowsHost() {
  const host = document.getElementById('windowsHost');
  if (!host) return;
  if (state.windows.length === 0) {
    host.innerHTML = '<div class="top4-empty">Geen ramen geconfigureerd. Klik hieronder om er één toe te voegen.</div>';
    return;
  }
  host.innerHTML = '';
  state.windows.forEach((w, idx) => host.appendChild(renderWindowCard(w, idx)));
}

function renderWindowCard(w, idx) {
  const card = el('div', { class: 'room-card' });
  const goalsByObj = id => RAAM_DOELEN.find(d => d.id === id);

  // Auto-warnings op basis van actuele waarden.
  const notices = [];
  if (w.frame_material && KOZIJN_REGELS[w.frame_material]) {
    notices.push({ icon: '⚠', text: KOZIJN_REGELS[w.frame_material].notice });
  }
  if (w.draaikiep) {
    notices.push({ icon: 'ℹ', text: 'Draaikiep raam: kies bij voorkeur Duette of Jaloezie met top-down/bottom-up bediening — geeft toegang tot raam zonder demontage.' });
  }
  if (w.wens_verduistering || (w.goals && w.goals.includes('verduistering'))) {
    notices.push({ icon: 'ℹ', text: 'Verduistering gewenst: bij overgordijn — geen Wave plooi, alleen verzwaringskoord of lock, geen onderzoom bij blackout-stof. Zonder blackout-stof: blackout voering toevoegen.' });
  }
  if (w.vol_muur) {
    notices.push({ icon: 'ℹ', text: 'Vol-muur aankleden: gordijnen volle muur, zonwering binnen "in de dag".' });
  }
  if (w.height && parseInt(w.height, 10) <= 1500) {
    notices.push({ icon: 'ℹ', text: 'Klein raam (≤ 1500 mm): bandhoogte 8 cm aanbevolen.' });
  }
  if (w.vent_rooster === 'ja') {
    notices.push({ icon: 'ℹ', text: 'Ventilatierooster aanwezig: kies bij Duette voor top-down/bottom-up bediening.' });
  }
  if (w.open_richting === 'binnen') {
    notices.push({ icon: 'ℹ', text: 'Raam draait naar binnen: gebruik ingespannen modellen, geen vrijhangende.' });
  }

  // Filter de Top 4 op basis van de gekozen doelen.
  const matches = filterRaamOplossingen(w.goals);
  const top4 = matches.slice(0, 4);

  card.innerHTML = `
    <div class="room-header">
      <span class="badge">Raam ${idx + 1}</span>
      <h3>${escHtml(w.name)}</h3>
      ${state.windows.length > 1
        ? `<button class="furniture-remove" type="button" data-action="remove-window">Verwijder raam</button>`
        : ''}
    </div>

    <div class="field-grid">
      <label>Naam<input type="text" data-field="name" value="${escHtml(w.name)}" /></label>
      <label>Hoogte (mm)<input type="number" min="0" step="10" data-field="height" value="${escHtml(w.height)}" placeholder="bijv. 2400" /></label>
      <label>Breedte (mm)<input type="number" min="0" step="10" data-field="width"  value="${escHtml(w.width)}"  placeholder="bijv. 1800" /></label>
      <label>Type raam
        <select data-field="operable_type">
          <option value="vast"      ${w.operable_type === 'vast'      ? 'selected' : ''}>Vast</option>
          <option value="bewegend"  ${w.operable_type === 'bewegend'  ? 'selected' : ''}>Bewegend</option>
          <option value="beide"     ${w.operable_type === 'beide'     ? 'selected' : ''}>Vast + bewegend</option>
        </select>
      </label>
      <label>Kozijn-materiaal
        <select data-field="frame_material">
          <option value="kunststof" ${w.frame_material === 'kunststof' ? 'selected' : ''}>Kunststof</option>
          <option value="hout"      ${w.frame_material === 'hout'      ? 'selected' : ''}>Hout</option>
          <option value="alu"       ${w.frame_material === 'alu'       ? 'selected' : ''}>Aluminium</option>
        </select>
      </label>
      <label>Montage
        <select data-field="mounting">
          <option value="in_de_dag" ${w.mounting === 'in_de_dag' ? 'selected' : ''}>In de dag</option>
          <option value="wand"      ${w.mounting === 'wand'      ? 'selected' : ''}>Wand op de dag</option>
          <option value="plafond"   ${w.mounting === 'plafond'   ? 'selected' : ''}>Plafond</option>
          <option value="kozijn"    ${w.mounting === 'kozijn'    ? 'selected' : ''}>Op het kozijn</option>
        </select>
      </label>
    </div>

    <div style="font-size:.82rem;font-weight:600;color:var(--accent-dk);margin-bottom:6px">Doel klant — wat moet dit raam doen?</div>
    <div class="goal-chips" data-goals-for="${escHtml(w.id)}">
      ${RAAM_DOELEN.map(d => `
        <span class="goal-chip ${w.goals.includes(d.id) ? 'active' : ''}" data-goal="${escHtml(d.id)}">${escHtml(d.label)}</span>
      `).join('')}
    </div>

    <div style="font-size:.82rem;font-weight:600;color:var(--accent-dk);margin-bottom:6px">
      Top ${top4.length || 0} aanbevolen combinaties
      ${w.goals.length > 0 ? `<span style="font-weight:400;color:var(--muted)">— gefilterd op: ${w.goals.map(g => escHtml(goalsByObj(g).label)).join(', ')}</span>` : ''}
    </div>
    <div class="top4-grid" data-top4-for="${escHtml(w.id)}">
      ${top4.length === 0
        ? '<div class="top4-empty">Geen combinatie dekt alle gekozen doelen samen. Verlaag het aantal doelen of kies minder strikte criteria.</div>'
        : top4.map(o => `
          <div class="top4-tile ${w.chosenComboId === o.id ? 'selected' : ''}" data-combo="${escHtml(o.id)}">
            <div class="combo">${o.combo.map(p => escHtml(PRODUCT_LABELS[p].label)).join(' + ')}</div>
            <div class="goals">Dekt: ${o.goals.map(g => escHtml(goalsByObj(g).label)).join(' · ')}</div>
            <span class="kapstaal">${escHtml(generateKapstalenId(state.style, state.palette, o.id, idx + 1))}</span>
          </div>
        `).join('')}
    </div>

    ${notices.map(n => `
      <div class="notice"><span class="icon">${n.icon}</span><span>${escHtml(n.text)}</span></div>
    `).join('')}

    <details class="advanced">
      <summary>Geavanceerde raam-eigenschappen</summary>
      <div class="field-grid" style="margin-top:10px">
        <label><input type="checkbox" data-field="vol_muur" ${w.vol_muur ? 'checked' : ''}> Vol-muur aankleden</label>

        <label><input type="checkbox" data-field="draaikiep" ${w.draaikiep ? 'checked' : ''}> Draai-/kiepraam</label>

        <label>Bediening
          <select data-field="bediening">
            <option value="hand"             ${w.bediening === 'hand'             ? 'selected' : ''}>Hand</option>
            <option value="electrisch"       ${w.bediening === 'electrisch'       ? 'selected' : ''}>Elektrisch</option>
            <option value="electrisch_accu"  ${w.bediening === 'electrisch_accu'  ? 'selected' : ''}>Elektrisch (accu)</option>
          </select>
        </label>
        <label>Inbouwdiepte (mm)<input type="number" min="0" step="5" data-field="inbouwdiepte" value="${escHtml(w.inbouwdiepte)}" placeholder="bijv. 75" /></label>
        <label>Open-richting
          <select data-field="open_richting">
            <option value="vast"   ${w.open_richting === 'vast'   ? 'selected' : ''}>Vast</option>
            <option value="binnen" ${w.open_richting === 'binnen' ? 'selected' : ''}>Naar binnen</option>
            <option value="buiten" ${w.open_richting === 'buiten' ? 'selected' : ''}>Naar buiten</option>
          </select>
        </label>
        <label>Ventilatierooster
          <select data-field="vent_rooster">
            <option value="onbekend" ${w.vent_rooster === 'onbekend' ? 'selected' : ''}>Onbekend</option>
            <option value="ja"       ${w.vent_rooster === 'ja'       ? 'selected' : ''}>Ja</option>
            <option value="nee"      ${w.vent_rooster === 'nee'      ? 'selected' : ''}>Nee</option>
          </select>
        </label>
      </div>
    </details>
  `;

  // Field updates → re-render alleen deze raam-card zodat de matched
  // matrix-suggesties + notices live meeveranderen.
  card.querySelectorAll('[data-field]').forEach(input => {
    input.addEventListener('change', () => {
      const key = input.dataset.field;
      w[key] = input.type === 'checkbox' ? input.checked : input.value;
      // Volledig opnieuw renderen voor het juiste effect (matrix + notices + chips).
      renderWindowsHost();
    });
  });

  // Goal-chips toggle (multi-select).
  card.querySelectorAll('[data-goal]').forEach(chip => {
    chip.addEventListener('click', () => {
      const id = chip.dataset.goal;
      if (w.goals.includes(id)) w.goals = w.goals.filter(g => g !== id);
      else w.goals = [...w.goals, id];
      renderWindowsHost();
    });
  });

  // Top 4 combinatie kiezen.
  card.querySelectorAll('[data-combo]').forEach(t => {
    t.addEventListener('click', () => {
      w.chosenComboId = t.dataset.combo;
      renderWindowsHost();
    });
  });

  // Verwijder-knop (alleen bij ≥ 2 ramen).
  const removeBtn = card.querySelector('[data-action="remove-window"]');
  if (removeBtn) {
    removeBtn.addEventListener('click', () => {
      removeWindow(w.id); renderWindowsHost();
    });
  }

  return card;
}

// ── STAP 6 — Foto-upload + JSON output ─────────────────────
// (Materiaal-keuze is bewust verwijderd: de visualizer-API van Kevin werkt
//  op style_id + color_palette_id; materialen worden door zijn model zelf
//  afgeleid uit de gekozen stijl.)
function renderStep6() {
  const host = $('#stepHost');
  host.innerHTML = '';
  const styleObj   = styleById(state.style);
  const paletteObj = paletteById(state.palette);

  const card = el('div', { class: 'step' });
  card.innerHTML = `
    <div class="step-eyebrow">Stap 6 van 6 · Style profile</div>
    <h2 class="step-title">Upload je foto — en zie hoe de AI je woonkamer invult</h2>
    <p class="step-lead">Upload een foto van de huidige woonruimte. We genereren een Style Profile (JSON)
       met je keuzes en prompt-tags voor de AI-visualizer.</p>

    ${state.aiSuggested ? `
      <div class="ai-suggest-banner">
        <span style="font-size:1.4rem">✨</span>
        <span><b>Inspireer me</b> — we hebben een combinatie voor je gekozen op basis van wat veelgevraagd is.
              Niet enthousiast? <a href="#" id="resetAi" style="color:var(--accent-dk);text-decoration:underline">handmatig opnieuw kiezen</a>.</span>
      </div>` : ''}

    <div class="profile-summary">
      <div class="profile-item">
        <div class="lbl">Woonstijl</div>
        <div class="val">${escHtml(styleObj.label)}</div>
        <div class="sub">${escHtml(styleObj.sub)}</div>
      </div>
      <div class="profile-item">
        <div class="lbl">Kleur-palet</div>
        <div class="val">${escHtml(paletteObj.label)}</div>
        <div class="sub">${escHtml(paletteObj.sub)}</div>
      </div>
    </div>

    <label class="upload-zone" id="dropZone">
      <input type="file" id="photoInput" accept="image/*" />
      <div class="icon">📷</div>
      <div class="title" id="dropTitle">Sleep een foto hierheen of klik om te kiezen</div>
      <div class="hint" id="dropHint">JPG, PNG of WEBP — bij voorkeur 1500px breed of meer</div>
    </label>

    <div id="photoPreviewWrap" style="display:none">
      <div class="photo-preview">
        <img id="photoImg" alt="Geüploade foto" />
        <div class="photo-meta" id="photoMeta"></div>
      </div>
    </div>

    <div class="step-actions">
      <button class="btn btn-ghost"   type="button" id="back6">← Vorige stap</button>
      <button class="btn btn-success btn-lg" type="button" id="genJson" disabled>✓ Genereer Style Profile</button>
    </div>

    <div id="jsonWrap" style="display:none;margin-top:24px">
      <h3 style="font-size:1rem;color:var(--accent-dk);margin-bottom:8px">Style Profile (JSON)</h3>
      <p style="font-size:.82rem;color:var(--muted);margin-bottom:8px">
        Wordt verstuurd naar de AI-visualizer-API met <code>style_id</code> en <code>color_palette_id</code>.
      </p>
      <pre class="json-out" id="jsonOut"></pre>
      <div class="copy-row">
        <button class="btn btn-primary" type="button" id="copyJson">📋 Kopieer JSON</button>
        <button class="btn btn-outline" type="button" id="downloadJson">⬇ Download JSON</button>
        <button class="btn btn-ghost"   type="button" id="resetAll">↺ Opnieuw beginnen</button>
      </div>

      <!-- Afsluitende boodschap die de gebruiker doorverwijst naar een Lab21-adviseur. -->
      <div class="final-note" id="finalNote">
        <span class="final-note-icon">✨</span>
        <div>
          <div class="final-note-title">Je persoonlijke stijl is vertaald naar jouw ruimte.</div>
          <div class="final-note-body">Vraag nu een van onze adviseurs voor de fysieke stalen van dit ontwerp.</div>
        </div>
      </div>
    </div>`;
  host.appendChild(card);

  // ── Listeners ─────────────────────────────────────────
  // Back-knop: terug naar stap 5 als raamdecor in scope, anders naar stap 4.
  card.querySelector('#back6').addEventListener('click', () => {
    gotoStep(scopeIncludesWindowDecor() ? 5 : 4);
  });

  const dropZone = card.querySelector('#dropZone');
  const fileInput = card.querySelector('#photoInput');
  const genBtn = card.querySelector('#genJson');

  ['dragenter','dragover'].forEach(ev =>
    dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.add('dragover'); }));
  ['dragleave','drop'].forEach(ev =>
    dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.remove('dragover'); }));
  dropZone.addEventListener('drop', e => {
    if (e.dataTransfer.files.length) handlePhoto(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', e => {
    if (e.target.files.length) handlePhoto(e.target.files[0]);
  });

  genBtn.addEventListener('click', () => {
    const json = buildStyleProfile();
    showJson(json);
  });

  if (state.aiSuggested) {
    const resetAi = card.querySelector('#resetAi');

      e.preventDefault();
      state.aiSuggested = false;
      gotoStep(1);

  // Restore vorige foto-keuze (bij terugnavigatie naar stap 6).
  if (state.photoDataUrl) showPhotoPreview();

// Foto inlezen, valideren, en als data-URL in state opslaan.
function handlePhoto(file) {
  if (!file || !file.type.startsWith('image/')) {
    alert('Kies een afbeeldingsbestand (JPG / PNG / WEBP).');
    return;
  }
  const MAX = 8 * 1024 * 1024; // 8 MB — boven dit is base64 te zwaar voor JSON copy/paste.
  if (file.size > MAX) {
    if (!confirm(`Deze foto is ${(file.size / 1024 / 1024).toFixed(1)} MB — base64 wordt erg groot. Toch doorgaan?`)) return;
  }
  const reader = new FileReader();
  reader.onload = ev => {
    state.photoFile = file;
    state.photoDataUrl = ev.target.result;
    showPhotoPreview();
    document.getElementById('genJson').disabled = false;
  };
  reader.readAsDataURL(file);
}

function showPhotoPreview() {
  const wrap = document.getElementById('photoPreviewWrap');
  const img = document.getElementById('photoImg');
  const meta = document.getElementById('photoMeta');
  if (!wrap || !state.photoDataUrl) return;
  img.src = state.photoDataUrl;
  const f = state.photoFile;
  const sizeMB = f ? (f.size / 1024 / 1024).toFixed(2) : '?';
  meta.innerHTML = `
    <div class="row"><span>Bestand</span><b>${escHtml(f ? f.name : 'foto')}</b></div>
    <div class="row"><span>Grootte</span><b>${escHtml(sizeMB)} MB</b></div>
    <div class="row"><span>Type</span><b>${escHtml(f ? f.type : '—')}</b></div>
    <div class="row" style="border-top:1px dashed var(--border);margin-top:8px;padding-top:8px;color:var(--muted);font-size:.78rem">
      De foto wordt als <code>base64</code> in het Style Profile JSON ingebed
      zodat het bestand zelfstandig naar de AI gaat.
    </div>`;
  wrap.style.display = '';
  document.getElementById('dropTitle').textContent = 'Foto klaar — klik om te vervangen';
  document.getElementById('dropHint').textContent  = state.photoFile ? state.photoFile.name : '';
  // Genereer-knop activeren als de foto al in state zat (bv. bij terug-navigatie).
  const genBtn = document.getElementById('genJson');
  if (genBtn) genBtn.disabled = false;
}

// ── Style profile (JSON output) ─────────────────────────
// Sleutel-namen volgen Kevin's AI-visualizer-API: style_id + color_palette_id
// zijn de primaire inputs; project_scope, existing_furniture en window_specs
// per raam zijn de uitbreiding voor het volledige interieur-advies.
function buildStyleProfile() {
  const styleObj   = styleById(state.style);
  const paletteObj = paletteById(state.palette);

  // Project-scope is al een array (multi-select) — direct doorgeven.
  const scopeArr = [...state.projectScope];

  // Behouden meubels — alleen velden met inhoud.
  const existing_furniture = state.furniture
    .filter(f => f.type || f.l || f.w || f.h || f.photoUrl)
    .map(f => ({
      type: f.type,
      dimensions: { l: parseInt(f.l, 10) || null, w: parseInt(f.w, 10) || null, h: parseInt(f.h, 10) || null },
      image_url: f.photoUrl || null,
    }));

  // Per-raam specs — alleen als raamdecor in scope.
  const window_specs = scopeIncludesWindowDecor() ? state.windows.map((w, idx) => {
    const oplossing = w.chosenComboId
      ? RAAM_OPLOSSINGEN.find(o => o.id === w.chosenComboId)
      : null;
    return {
      name: w.name,
      dimensions: { width: parseInt(w.width, 10) || null, height: parseInt(w.height, 10) || null },
      frame_material: w.frame_material,
      operable_type:  w.operable_type,
      mounting:       w.mounting,
      function_goals: w.goals,
      suggested_products: oplossing ? oplossing.combo : [],
      kapstalen_id: oplossing ? generateKapstalenId(state.style, state.palette, oplossing.id, idx + 1) : null,
      advanced: {
        vol_muur: w.vol_muur,
        wens_verduistering: w.wens_verduistering,
        draaikiep: w.draaikiep,
        vent_rooster: w.vent_rooster,
        bediening: w.bediening,
        inbouwdiepte: parseInt(w.inbouwdiepte, 10) || null,
        open_richting: w.open_richting,
        hor_nodig: w.hor_nodig,
      },
    };
  }) : [];

  // Tags: stijl + palet samengevoegd, doublures verwijderd.
  const tags = [...styleObj.tags, ...paletteObj.tags];
  const uniqueTags = Array.from(new Set(tags));

  // Plattegrond/bouwtekening — alleen aanwezig als de klant er één geüpload heeft.
  const floor_plan = state.floorPlanFile ? {
    filename: state.floorPlanFile.name,
    mime_type: state.floorPlanFile.type,
    size_bytes: state.floorPlanFile.size,
    data_url: state.floorPlanDataUrl,
  } : null;

  return {
    style_id: state.style,
    color_palette_id: state.palette,
    project_scope: scopeArr,
    existing_furniture,
    window_specs,
    floor_plan,
    customer_photo_url: state.photoDataUrl,
    ai_prompt_tags: uniqueTags,
    meta: {
      style_label: styleObj.label,
      palette_label: paletteObj.label,
      ai_suggested: state.aiSuggested,
      furniture_count: existing_furniture.length,
      window_count: window_specs.length,
      has_floor_plan: !!floor_plan,
      generated_at: new Date().toISOString(),
    },
  };
}

// JSON renderen met basis syntax-highlight, en data-URL truncated voor leesbaarheid.
function showJson(profile) {
  const wrap = document.getElementById('jsonWrap');
  const out = document.getElementById('jsonOut');
  // Voor de UI: data-URLs (foto + plattegrond) afkappen op 60 chars + "[…+ N bytes]"
  // zodat het scherm leesbaar blijft. Volledige base64 blijft in de download.
  const display = JSON.parse(JSON.stringify(profile));
  if (display.customer_photo_url && display.customer_photo_url.length > 100) {
    const full = display.customer_photo_url;
    display.customer_photo_url = `${full.slice(0, 60)}…[+${full.length - 60} bytes base64]`;
  }
  if (display.floor_plan && display.floor_plan.data_url && display.floor_plan.data_url.length > 100) {
    const full = display.floor_plan.data_url;
    display.floor_plan.data_url = `${full.slice(0, 60)}…[+${full.length - 60} bytes base64]`;
  }
  out.innerHTML = highlightJson(JSON.stringify(display, null, 2));
  wrap.style.display = '';
  // Knoppen wiren — eenmalig.
  document.getElementById('copyJson').onclick = () => copyJson(profile);
  document.getElementById('downloadJson').onclick = () => downloadJson(profile);
  document.getElementById('resetAll').onclick = resetAll;
  wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Minimale JSON-highlighter — kleurt keys/strings/numbers/booleans.
function highlightJson(str) {
  return escHtml(str)
    .replace(/(&quot;[^&]*?&quot;)(\s*:)/g, '<span class="k">$1</span>$2')
    .replace(/:\s*(&quot;[^&]*?&quot;)/g, ': <span class="s">$1</span>')
    .replace(/:\s*(true|false|null)/g, ': <span class="b">$1</span>')
    .replace(/:\s*(-?\d+(\.\d+)?)/g, ': <span class="n">$1</span>');
}

function copyJson(profile) {
  const text = JSON.stringify(profile, null, 2);
  navigator.clipboard.writeText(text).then(showToast).catch(() => {
    // Fallback voor oudere browsers.
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); showToast();
  });
}

function downloadJson(profile) {
  const text = JSON.stringify(profile, null, 2);
  const blob = new Blob([text], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `style_profile_${profile.style_id}_${profile.color_palette_id}.json`;
  a.click();
  // Korte vertraging zodat de download daadwerkelijk start vóór de URL ingetrokken wordt.
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function showToast(msg = 'Gekopieerd ✓') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 1600);
}

// ── "Inspireer me" — automatisch een geldig profiel kiezen ──
// Vult stijl + palet + scope=both + één raam met privacy/sfeer/akoestiek,
// en kiest gelijk de eerste matching combinatie. Springt naar stap 6.
function inspireerMe() {
  const POPULAR = [
    { style: 'Industrial',   palette: 'Warm_Earth' },
    { style: 'Industrial',   palette: 'Bold_Contrast' },
    { style: 'Scandinavian', palette: 'Warm_Earth' },
    { style: 'Scandinavian', palette: 'Cool_Fresh' },
    { style: 'Modern',       palette: 'Cool_Fresh' },
    { style: 'Modern',       palette: 'Bold_Contrast' },
    { style: 'Country',      palette: 'Warm_Earth' },
    { style: 'Country',      palette: 'Natural_Green' },
  ];
  const pick = POPULAR[Math.floor(Math.random() * POPULAR.length)];
  state.style        = pick.style;
  state.palette      = pick.palette;
  // Volledige metamorfose: vloer + raamdecor + meubelen.
  state.projectScope = ['flooring', 'window_decor', 'furniture'];
  // Eén voorbeeld-raam zodat de JSON niet leeg is voor window_decor.
  if (state.windows.length === 0) addWindow();
  const w = state.windows[0];
  w.height = '2400'; w.width = '1800';
  w.frame_material = 'kunststof';
  w.goals = ['privacy', 'sfeer', 'akoestiek'];
  // Eerste matching combinatie selecteren.
  const top = filterRaamOplossingen(w.goals);
  if (top.length > 0) w.chosenComboId = top[0].id;
  state.aiSuggested = true;
  gotoStep(6);
}

// ── Navigatie ──────────────────────────────────────────────
// Stap 5 wordt automatisch overgeslagen wanneer scope alleen 'flooring' is.
function gotoStep(n) {
  // Vooruit: voorwaarden bekijken. Achteruit: altijd toegestaan.
  if (n > 1 && !state.style)                  n = 1;
  if (n > 2 && !state.palette)                n = 2;
  if (n > 4 && state.projectScope.length === 0) n = 4;
  // Auto-skip stap 5 bij scope flooring-only.
  if (n === 5 && !scopeIncludesWindowDecor()) n = state.step < 5 ? 6 : 4;

  state.step = n;
  renderProgress();
  if (n === 1) renderStep1();
  if (n === 2) renderStep2();
  if (n === 3) renderStep3();
  if (n === 4) renderStep4();
  if (n === 5) renderStep5();
  if (n === 6) renderStep6();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetAll() {
  state.step = 1;
  state.style = state.palette = null;
  state.projectScope = [];
  state.furniture = [];
  state.windows = [];
  state.photoFile = state.photoDataUrl = null;
  state.floorPlanFile = state.floorPlanDataUrl = null;
  state.aiSuggested = false;
  renderPlanUpload();
  gotoStep(1);
}

// ── Init ───────────────────────────────────────────────────
document.getElementById('btnInspireer').addEventListener('click', inspireerMe);
setupPlanUpload();
gotoStep(1);
</script>
