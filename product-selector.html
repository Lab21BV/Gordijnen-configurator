<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vrije Keuze — Product Selector</title>
  <link rel="stylesheet" href="style-engine.css" />
  <style>
    /* ── Page-specifieke CSS voor Vrije Keuze (product-selector) ──
       Alle gedeelde basis (header, btn, step, tile, upload-zone, toast,
       final-note, plan-upload, etc.) zit in style-engine.css. Hier alleen
       wat enkel op deze pagina voorkomt: tabs, filter-bar, product-grid,
       cart-panel, ctx-card en de 4-staps progress-bar. */

    .progress-row { grid-template-columns: repeat(4, 1fr); }
    /* Compactere padding zodat het twee-koloms layout (main + cart) past. */
    .page { max-width: 1300px; padding: 22px 22px 80px; }

    /* ── Layout: main + cart (sticky right column op desktop) ── */
    .layout {
      display: grid; grid-template-columns: 1fr 320px; gap: 20px;
      align-items: start;
    }
    @media (max-width: 980px) { .layout { grid-template-columns: 1fr; } }

    /* ── Tabs (productgroepen) ──────────────────────────── */
    .tabs {
      display: flex; gap: 2px;
      border-bottom: 2px solid var(--border); margin-bottom: 16px;
    }
    .tab {
      cursor: pointer; padding: 10px 18px;
      font-size: .9rem; font-weight: 600; color: var(--muted);
      background: transparent; border: none;
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: all .15s;
    }
    .tab:hover { color: var(--accent-dk); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-empty {
      padding: 20px; text-align: center; color: var(--muted);
      font-size: .85rem; background: #fafbfd;
      border: 1px dashed var(--border); border-radius: 6px;
    }

    /* ── Filters ─────────────────────────────────────────── */
    .filter-bar {
      display: flex; flex-wrap: wrap; gap: 8px;
      align-items: center; margin-bottom: 14px;
    }
    .filter-bar .filter-label { font-size: .76rem; font-weight: 700; color: var(--muted); margin-right: 4px; }
    .filter-chip {
      cursor: pointer; user-select: none;
      font-size: .76rem; font-weight: 600;
      padding: 5px 11px; border-radius: 16px;
      background: #f4f5f7; border: 1px solid var(--border);
      color: var(--muted); transition: all .15s;
    }
    .filter-chip:hover  { border-color: var(--accent); color: var(--accent-dk); }
    .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── Product grid ─────────────────────────────────────── */
    .product-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 14px;
    }
    .product-card {
      cursor: pointer; user-select: none; position: relative;
      background: var(--surface); border: 2px solid var(--border);
      border-radius: 8px; overflow: hidden;
      display: flex; flex-direction: column;
      transition: all .15s;
    }
    .product-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); border-color: var(--accent); }
    .product-card.in-cart {
      border-color: var(--success);
      box-shadow: 0 0 0 3px var(--success-lt);
    }
    .product-card.in-cart::after {
      content: '✓'; position: absolute; top: 8px; right: 8px;
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--success); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem; font-weight: 700;
      box-shadow: 0 1px 4px rgba(0,0,0,.25);
    }
    .product-preview { aspect-ratio: 4/3; width: 100%; position: relative; overflow: hidden; }
    .product-preview .pattern-vis { position: absolute; inset: 0; background-size: 40px 40px; }
    .product-body { padding: 10px 12px; flex: 1; }
    .product-name { font-size: .88rem; font-weight: 700; color: var(--accent-dk); margin-bottom: 2px; line-height: 1.3; }
    .product-meta { font-size: .72rem; color: var(--muted); line-height: 1.4; }
    .product-id {
      font-family: 'Courier New', monospace; font-size: .68rem;
      color: var(--accent); background: var(--accent-lt);
      padding: 1px 5px; border-radius: 3px;
      display: inline-block; margin-top: 5px;
    }

    /* ── Window context (boven raamdecor catalog) ─────────── */
    .ctx-card {
      background: var(--accent-lt); border: 1px solid #c4d4e6;
      border-radius: 8px; padding: 12px 14px; margin-bottom: 14px;
    }
    .ctx-card .ctx-title {
      font-size: .82rem; font-weight: 700; color: var(--accent-dk);
      margin-bottom: 8px;
    }
    .ctx-fields {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
    }
    .ctx-fields label {
      font-size: .72rem; font-weight: 600; color: var(--muted);
      display: flex; flex-direction: column; gap: 3px;
    }
    .ctx-fields select, .ctx-fields input {
      font: inherit; padding: 6px 8px; border: 1px solid var(--border);
      border-radius: 5px; font-size: .82rem; background: #fff; color: var(--text);
    }

    /* ── Cart panel (rechterkolom, sticky) ────────────────── */
    .cart-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 18px; position: sticky; top: 76px;
      max-height: calc(100vh - 96px); overflow-y: auto;
    }
    .cart-title { font-size: 1rem; font-weight: 700; color: var(--accent-dk); margin-bottom: 4px; }
    .cart-sub   { font-size: .76rem; color: var(--muted); margin-bottom: 14px; }
    .cart-section { margin-bottom: 14px; }
    .cart-section-title {
      font-size: .68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--accent); margin-bottom: 6px;
    }
    .cart-item {
      display: grid; grid-template-columns: 36px 1fr auto;
      gap: 8px; align-items: center;
      padding: 7px 0; border-bottom: 1px dashed var(--border);
    }
    .cart-item:last-child { border-bottom: none; }
    .cart-item .swatch { width: 36px; height: 28px; border-radius: 4px; border: 1px solid var(--border); }
    .cart-item .name { font-size: .82rem; font-weight: 600; color: var(--accent-dk); line-height: 1.25; }
    .cart-item .id   { font-family: 'Courier New', monospace; font-size: .68rem; color: var(--muted); }
    .cart-item button {
      background: transparent; border: 1px solid var(--border);
      color: var(--error); border-radius: 4px;
      width: 26px; height: 26px; cursor: pointer; font-size: .9rem; line-height: 1;
    }
    .cart-item button:hover { background: var(--error-lt); border-color: var(--error); }
    .cart-empty {
      padding: 14px; text-align: center; color: var(--muted);
      font-size: .82rem; font-style: italic;
    }
    .cart-notice {
      background: var(--warn-lt); border: 1px solid #ffcc80;
      color: #7b3a00; padding: 8px 11px; border-radius: 6px;
      font-size: .78rem; margin-top: 8px; line-height: 1.45;
      display: flex; gap: 6px; align-items: flex-start;
    }
    .cart-notice .icon { flex-shrink: 0; font-size: .95rem; line-height: 1.3; }
    .cart-notice .alt-btn {
      display: inline-block; margin-top: 4px;
      font-size: .72rem; font-weight: 700; color: var(--accent-dk);
      text-decoration: underline; cursor: pointer;
    }

    @media (max-width: 540px) {
      .cart-panel { position: static; max-height: none; }
    }
  </style>
</head>

const SCOPES = [

// ── Rendering helpers ───────────────────────────────────────
function $(s) { return document.querySelector(s); }
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function el(tag, attrs = {}, html = '') {
  const n = document.createElement(tag);
  Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'class') n.className = v;
    else if (k.startsWith('on')) n.addEventListener(k.slice(2), v);
    else n.setAttribute(k, v);
  });
  if (html) n.innerHTML = html;
  return n;
}

// ── Plattegrond / bouwtekening upload ───────────────────────
// Compacte component bovenaan — accepteert JPG/PNG/WEBP en PDF; slaat het
// bestand als base64 op in state.floorPlanDataUrl. Wordt meegestuurd in de
// uiteindelijke JSON zodat een adviseur er maatberekeningen op kan doen.
function setupPlanUpload() {
  const card = document.getElementById('planUpload');
  if (!card) return;
  ['dragenter','dragover'].forEach(ev =>
    card.addEventListener(ev, e => { e.preventDefault(); card.classList.add('dragover'); }));
  ['dragleave','drop'].forEach(ev =>
    card.addEventListener(ev, e => { e.preventDefault(); card.classList.remove('dragover'); }));
  card.addEventListener('drop', e => {
    if (e.dataTransfer.files.length) handleFloorPlan(e.dataTransfer.files[0]);
  });
  card.addEventListener('change', e => {
    if (e.target.matches('input[type="file"]') && e.target.files.length)
      handleFloorPlan(e.target.files[0]);
  });
  card.addEventListener('click', e => {
    if (e.target.id === 'planRemove') {
      state.floorPlanFile = null;
      state.floorPlanDataUrl = null;
      renderPlanUpload();
    }
  });
  renderPlanUpload();
}

function handleFloorPlan(file) {
  const isImage = file.type.startsWith('image/');
  const isPdf   = file.type === 'application/pdf';
  if (!isImage && !isPdf) {
    alert('Kies een afbeelding (JPG/PNG/WEBP) of een PDF.');
    return;
  }
  const MAX = 8 * 1024 * 1024;
  if (file.size > MAX && !confirm(`Plattegrond is ${(file.size/1024/1024).toFixed(1)} MB — base64 wordt erg groot. Toch insluiten?`)) return;
  const r = new FileReader();
  r.onload = ev => {
    state.floorPlanFile = file;
    state.floorPlanDataUrl = ev.target.result;
    renderPlanUpload();
  };
  r.readAsDataURL(file);
}

function renderPlanUpload() {
  const card = document.getElementById('planUpload');
  if (!card) return;
  if (!state.floorPlanFile) {
    card.classList.remove('has-file');
    card.innerHTML = `
      <span class="pu-icon">📐</span>
      <div class="pu-text">
        <div class="pu-title">Plattegrond of bouwtekening (optioneel)</div>
        <div class="pu-sub">Upload een PDF of afbeelding — wij rekenen oppervlakte en maten voor je uit. Sleep hierheen of kies hieronder.</div>
      </div>
      <div class="pu-actions">
        <label class="btn btn-outline btn-sm">📎 Bestand kiezen
          <input type="file" accept="image/*,application/pdf">
        </label>
      </div>`;
    return;
  }
  const f = state.floorPlanFile;
  const sizeMB = (f.size/1024/1024).toFixed(2);
  const isImg = f.type.startsWith('image/');
  card.classList.add('has-file');
  card.innerHTML = `
    <div class="pu-thumb">${isImg ? `<img src="${escHtml(state.floorPlanDataUrl)}" alt="">` : '📄'}</div>
    <div class="pu-text">

function renderProgress() {
  const total = 4;
  $('#progressFill').style.width = ((state.step - 1) / (total - 1) * 100) + '%';
  document.querySelectorAll('.progress-step').forEach(node => {
    const n = parseInt(node.dataset.step, 10);
    node.classList.toggle('active', n === state.step);
    node.classList.toggle('done',   n < state.step);
  });
}

// ── STAP 1 — Scope ─────────────────────────────────────────
function renderStep1() {
  const host = $('#stepHost');
  host.innerHTML = '';
  const card = el('div', { class: 'step' });
  card.innerHTML = `
    <div class="step-eyebrow">Stap 1 van 4 · Scope</div>
    <h2 class="step-title">Wat wil je in je nieuwe interieur aanpassen?</h2>
    <p class="step-lead">Kies één of meerdere zones. Per zone krijg je in stap 3 een eigen catalogus
       met filters en een live texture-preview. <em>Muur en Meubelen</em> komen in een volgende release.</p>
    <div class="tiles" id="scopeGrid"></div>
    <div class="step-actions">
      <span style="font-size:.78rem;color:var(--muted)" id="scopeHint">Selecteer minimaal één scope om verder te gaan.</span>
      <button class="btn btn-primary btn-lg" type="button" id="next1" disabled>Volgende →</button>
    </div>`;
  host.appendChild(card);

  const grid = card.querySelector('#scopeGrid');
  const next = card.querySelector('#next1');
  const hint = card.querySelector('#scopeHint');

  function refresh() {
    Array.from(grid.children).forEach(t => {
      const id = t.dataset.id;
      t.classList.toggle('selected', state.scope.includes(id));
    });
    next.disabled = state.scope.length === 0;
    hint.textContent = state.scope.length === 0
      ? 'Selecteer minimaal één scope om verder te gaan.'
      : `${state.scope.length} scope(s) gekozen — klik op Volgende.`;
  }

  // Render gedeelde .tile component (zelfde stijl als Style Engine).
  // Future-scopes (Muur, Meubelen) gebruiken .dimmed zodat ze visueel matchen
  // met het uitgesloten-palette patroon in Style Engine.
  SCOPES.forEach(s => {
    const tile = el('button', {
      type: 'button',
      class: `tile ${s.future ? 'dimmed' : ''} ${state.scope.includes(s.id) ? 'selected' : ''}`,
      'data-id': s.id,
    });
    const futureBadge = s.future
      ? '<div style="position:absolute;top:8px;left:8px;background:rgba(255,255,255,.85);color:var(--warn);font-size:.62rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:10px">Binnenkort</div>'
      : '';
    tile.innerHTML = `
      ${futureBadge}
      <div class="tile-image ${s.bgClass}">
        <span class="${s.iconColor}">${SCOPE_ICONS[s.id] || ''}</span>
      </div>
      <div class="tile-body">
        <div class="tile-title">${escHtml(s.label)}</div>
        <div class="tile-sub">${escHtml(s.sub)}</div>
      </div>`;
    if (!s.future) {
      tile.addEventListener('click', () => {
        if (state.scope.includes(s.id)) state.scope = state.scope.filter(x => x !== s.id);
        else state.scope = [...state.scope, s.id];
        refresh();
      });
    }
    grid.appendChild(tile);
  });
  refresh();

  next.addEventListener('click', () => gotoStep(2));
}

// ── STAP 3 — Productselectie (tabs + filters + grid) ──────
function renderStep3() {

  const tabs = [];
  if (state.scope.includes('flooring'))     tabs.push({ id: 'floor',  label: 'Vloer'        });
  if (state.scope.includes('window_decor')) tabs.push({ id: 'window', label: 'Raamdecoratie'});

    state.activeTab = tabs[0]?.id;
  }

  const card = el('div', { class: 'step' });
  card.innerHTML = `
    <div class="step-eyebrow">Stap 3 van 4 · Catalogus</div>
    <h2 class="step-title">Kies je producten</h2>
    <p class="step-lead">Filter op materiaal of doel, klik op een product om het in je winkelmand te leggen.
       Bij conflicten met je raamtechniek zie je rechts direct een waarschuwing of alternatief.</p>

    <div class="tabs" id="tabs">
      ${tabs.map(t => `<button class="tab ${state.activeTab === t.id ? 'active' : ''}" data-tab="${escHtml(t.id)}">${escHtml(t.label)}</button>`).join('')}

function renderFloorTab() {

  );

          <select data-ctx="draaikiep">

// ── Product card (gedeelde renderer) ─────────────────────
function renderProductCard(product, kind) {
  const inCart = kind === 'floor'
    ? state.selectedFloor && state.selectedFloor.id === product.id
    : state.selectedWindows.some(w => w.id === product.id);
  const card = el('div', {
    class: `product-card ${inCart ? 'in-cart' : ''}`,
    'data-id': product.id,
  });
  // Texture-preview placeholder: gradient + (voor vloer) een patroon-overlay.
  // ── REPLACE: vervang deze div door <img src="${product.texture_map}"> wanneer
  //    de echte textuur-CDN online is. ──
  const overlay = kind === 'floor'
    ? `<div class="pattern-vis" style="background-image: ${product.pattern === 'visgraat'
        ? `repeating-linear-gradient(45deg, rgba(0,0,0,.15) 0 8px, rgba(255,255,255,.05) 8px 16px)`
        : `repeating-linear-gradient(0deg, rgba(0,0,0,.15) 0 18px, rgba(255,255,255,.04) 18px 38px)`}"></div>`
    : '';
  const meta = kind === 'floor'
    ? `${escHtml(product.material)} · ${escHtml(product.pattern)}`
    : `${escHtml(PRODUCT_LABELS[product.product_type] || product.product_type)} · dekt ${product.goals.length} doel(en)`;

  card.innerHTML = `
    <div class="product-preview" style="background:${product.color}">${overlay}</div>
    <div class="product-body">
      <div class="product-name">${escHtml(product.name)}</div>
      <div class="product-meta">${meta}</div>
      <span class="product-id">${escHtml(product.id)}</span>
    </div>`;
  card.addEventListener('click', () => {
    if (kind === 'floor') {
      // Vloer = single-select. Wisselen = nieuwe keuze; klik op huidige = afkoppelen.
      state.selectedFloor = inCart ? null : product;
      showToast(inCart ? 'Vloer verwijderd' : 'Vloer toegevoegd ✓');
    } else {
      if (inCart) {
        state.selectedWindows = state.selectedWindows.filter(w => w.id !== product.id);
        showToast('Verwijderd');
      } else {
        state.selectedWindows = [...state.selectedWindows, product];
        showToast('Toegevoegd ✓');
      }
    }
    renderStep3();
    renderCart();
  });
  return card;
}

// ── Validatie tegen kozijn / combinatie-assistent ────────
// Retourneert een lijst van {icon, text, alt? } objecten voor weergave in
// het winkelmandje. Implementeert de logica uit de briefing:
//   - Kozijn-conflict: kunststof/alu kozijn + product dat alleen 'drill' kan
//   - Draaikiep + product dat geen top-down/bottom-up biedt (alleen Duette
//     en Jaloezie ondersteunen die mode in onze catalogus)
//   - Solo Inbetween → suggereer combinatie voor verduistering/akoestiek
function validateCart() {
  const notices = [];
  const ctx = state.windowContext;
  const winSel = state.selectedWindows;

  // 1. Per geselecteerd window-product: mount-compat tegen kozijn.
  winSel.forEach(p => {
    const ok = p.mount_compatible.some(m => {
      if ((ctx.frame_material === 'kunststof' || ctx.frame_material === 'alu') && m === 'drill') return false;
      return true;
    });
    if (!ok) {
      const altType = p.product_type === 'jaloezie' ? 'duette' : 'rolgordijn';
      const alt = WINDOW_CATALOG.find(w => w.product_type === altType && w.mount_compatible.includes('clamp'));
      notices.push({
        icon: '⚠',
        text: `${p.name} vereist boren — niet toegestaan bij ${ctx.frame_material === 'kunststof' ? 'kunststof' : 'aluminium'} kozijn.`,
        altLabel: alt ? `Bekijk alternatief: ${alt.name}` : null,
        altId: alt && alt.id,
      });
    }
  });

  // 2. Draaikiep raam: alleen Duette en Jaloezie geven praktische top-down/bottom-up
  //    toegang; gordijnen of rolgordijnen blokkeren het raam volledig.
  if (ctx.draaikiep && winSel.length > 0) {
    const heeftKiepVriendelijk = winSel.some(p => ['duette','jaloezie'].includes(p.product_type));
    if (!heeftKiepVriendelijk) {
      const alt = WINDOW_CATALOG.find(w => w.product_type === 'duette' && w.mount_compatible.includes('clamp'));
      notices.push({
        icon: 'ℹ',
        text: 'Draai-/kiepraam: gekozen producten belemmeren het kantelen. Een Duette of Jaloezie met top-down/bottom-up bediening werkt beter.',
        altLabel: alt ? `Bekijk alternatief: ${alt.name}` : null,
        altId: alt && alt.id,
      });
    }
  }

  // 3. Combinatie-assistent: solo Inbetween geeft geen privacy 's avonds.
  if (winSel.length === 1 && winSel[0].product_type === 'inbetween') {
    const alt = WINDOW_CATALOG.find(w => w.product_type === 'duette' && w.goals.includes('verduistering'));
    notices.push({
      icon: '💡',
      text: 'Alleen Inbetween: geen privacy of verduistering ’s avonds. Combineer voor een complete oplossing met een Duette of Rolgordijn.',
      altLabel: alt ? `Voeg combinatie toe: ${alt.name}` : null,
      altId: alt && alt.id,
    });
  }

  // 4. Verduistering-doel actief maar geen verduisterend product.
  if (state.filters.window.goals.includes('verduistering') && winSel.length > 0) {
    const heeftVerd = winSel.some(p => p.goals.includes('verduistering'));
    if (!heeftVerd) {
      notices.push({
        icon: '⚠',
        text: 'Doel “Verduistering” gekozen, maar geen enkel geselecteerd product dekt dat. Voeg een Duette Blackout, Rolgordijn Verduisterend of Velvet Overgordijn toe.',
        altLabel: null, altId: null,
      });
    }
  }

  return notices;
}

// ── Cart panel rendering ─────────────────────────────────
function renderCart() {
  const host = document.getElementById('cartPanel');
  if (!host) return;

  const totalItems = (state.selectedFloor ? 1 : 0) + state.selectedWindows.length;

  if (state.step === 1) {
    // Op stap 1 toont het cart-paneel een korte 'wat-komt-er' uitleg.

      <div class="cart-title">Hoe het werkt</div>

         Per gekozen product slaan we een <code>Product_ID</code> en <code>Texture_Map</code> op die direct
         door Kevin's AI ingelezen worden bij de render in stap 4.</p>`;
    return;
  }

  const notices = validateCart();
  host.innerHTML = `
    <div class="cart-title">🛒 Winkelmand</div>
    <div class="cart-sub">${totalItems} product(en) geselecteerd</div>

    ${state.selectedFloor ? `
      <div class="cart-section">
        <div class="cart-section-title">Vloer</div>
        <div class="cart-item" data-rm-floor>
          <div class="swatch" style="background:${state.selectedFloor.color}"></div>
          <div>
            <div class="name">${escHtml(state.selectedFloor.name)}</div>
            <div class="id">${escHtml(state.selectedFloor.id)}</div>
          </div>
          <button title="Verwijder" data-rm-floor-btn>✕</button>
        </div>
      </div>` : ''}

    ${state.selectedWindows.length > 0 ? `
      <div class="cart-section">
        <div class="cart-section-title">Raamdecoratie (${state.selectedWindows.length})</div>
        ${state.selectedWindows.map(w => `
          <div class="cart-item">
            <div class="swatch" style="background:${w.color}"></div>
            <div>
              <div class="name">${escHtml(w.name)}</div>
              <div class="id">${escHtml(w.id)}</div>
            </div>
            <button title="Verwijder" data-rm-win="${escHtml(w.id)}">✕</button>
          </div>`).join('')}
      </div>` : ''}

    ${totalItems === 0 ? '<div class="cart-empty">Nog niets geselecteerd. Klik in stap 3 op een product.</div>' : ''}

    ${notices.map(n => `
      <div class="cart-notice">
        <span class="icon">${n.icon}</span>
        <span>${escHtml(n.text)}${n.altLabel ? `<br><span class="alt-btn" data-add-alt="${escHtml(n.altId)}">${escHtml(n.altLabel)} →</span>` : ''}</span>
      </div>`).join('')}`;

  // Verwijder vloer.
  const rmFloor = host.querySelector('[data-rm-floor-btn]');
  if (rmFloor) rmFloor.addEventListener('click', () => {
    state.selectedFloor = null;
    if (state.step === 3) renderStep3();
    renderCart();
  });
  // Verwijder raamdecor.
  host.querySelectorAll('[data-rm-win]').forEach(btn => btn.addEventListener('click', () => {
    state.selectedWindows = state.selectedWindows.filter(w => w.id !== btn.dataset.rmWin);
    if (state.step === 3) renderStep3();
    renderCart();
  }));
  // Klik op alternatief in een notice → product toevoegen aan cart.
  host.querySelectorAll('[data-add-alt]').forEach(btn => btn.addEventListener('click', () => {
    const id = btn.dataset.addAlt;
    const prod = WINDOW_CATALOG.find(w => w.id === id);
    if (prod && !state.selectedWindows.some(w => w.id === id)) {
      state.selectedWindows = [...state.selectedWindows, prod];
      showToast('Alternatief toegevoegd ✓');
    }
    if (state.step === 3) renderStep3();
    renderCart();
  }));
}

// ── STAP 4 — Foto + JSON ─────────────────────────────────
function renderStep4() {
  const host = $('#stepHost');
  host.innerHTML = '';
  const card = el('div', { class: 'step' });
  card.innerHTML = `
    <div class="step-eyebrow">Stap 4 van 4 · Render-input</div>
    <h2 class="step-title">Upload je ruimte — Kevin's AI rendert je selectie</h2>
    <p class="step-lead">Het profiel hieronder wordt samen met de foto verstuurd. De AI gebruikt de
       <code>Product_ID</code>'s en <code>Texture_Map</code>'s om jouw selectie precies in te tekenen.</p>

    <label class="upload-zone" id="dropZone">
      <input type="file" id="photoInput" accept="image/*" />
      <div class="icon">📷</div>
      <div class="title" id="dropTitle">Sleep een foto hierheen of klik om te kiezen</div>
      <div class="hint" id="dropHint">JPG, PNG of WEBP — bij voorkeur 1500px breed of meer</div>
    </label>

    <div id="photoPreviewWrap" style="display:none">
      <div class="photo-preview">
        <img id="photoImg" alt="Geüploade foto" />
        <div class="photo-meta" id="photoMeta"></div>
      </div>
    </div>

    <div class="step-actions">
      <button class="btn btn-ghost" type="button" id="back4">← Producten</button>
      <button class="btn btn-success btn-lg" type="button" id="genJson" disabled>✓ Genereer profiel</button>
    </div>

    <div id="jsonWrap" style="display:none;margin-top:22px">
      <h3 style="font-size:1rem;color:var(--accent-dk);margin-bottom:8px">Free-Selection Profile (JSON)</h3>
      <p style="font-size:.82rem;color:var(--muted);margin-bottom:8px">Met <code>mode: "free_selection"</code> &mdash; klaar voor Kevin's API.</p>
      <pre class="json-out" id="jsonOut"></pre>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px">
        <button class="btn btn-primary" type="button" id="copyJson">📋 Kopieer JSON</button>
        <button class="btn btn-outline" type="button" id="downloadJson">⬇ Download JSON</button>
        <button class="btn btn-ghost"   type="button" id="resetAll">↺ Opnieuw</button>
      </div>

      <div class="final-note" id="finalNote">
        <span class="final-note-icon">✨</span>
        <div>
          <div class="final-note-title">Je persoonlijke selectie is klaar voor de visualisatie.</div>
          <div class="final-note-body">Vraag een van onze adviseurs voor de fysieke stalen van deze producten.</div>
        </div>
      </div>
    </div>`;
  host.appendChild(card);

  card.querySelector('#back4').addEventListener('click', () => gotoStep(3));
  const dropZone = card.querySelector('#dropZone');
  const fileInput = card.querySelector('#photoInput');
  const genBtn = card.querySelector('#genJson');

  ['dragenter','dragover'].forEach(ev =>
    dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.add('dragover'); }));
  ['dragleave','drop'].forEach(ev =>
    dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.remove('dragover'); }));
  dropZone.addEventListener('drop', e => {
    if (e.dataTransfer.files.length) handlePhoto(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', e => {
    if (e.target.files.length) handlePhoto(e.target.files[0]);
  });
  genBtn.addEventListener('click', () => showJson(buildProfile()));

  if (state.photoDataUrl) showPhotoPreview();
}

function handlePhoto(file) {
  if (!file || !file.type.startsWith('image/')) {
    alert('Kies een afbeeldingsbestand (JPG / PNG / WEBP).');
    return;
  }
  const MAX = 8 * 1024 * 1024;
  if (file.size > MAX && !confirm(`Foto is ${(file.size/1024/1024).toFixed(1)} MB — base64 wordt erg groot. Toch doorgaan?`)) return;
  const r = new FileReader();
  r.onload = ev => {
    state.photoFile = file; state.photoDataUrl = ev.target.result;
    showPhotoPreview();
    document.getElementById('genJson').disabled = false;
  };
  r.readAsDataURL(file);
}

function showPhotoPreview() {
  const wrap = document.getElementById('photoPreviewWrap');
  const img = document.getElementById('photoImg');
  const meta = document.getElementById('photoMeta');
  if (!wrap || !state.photoDataUrl) return;
  img.src = state.photoDataUrl;
  const f = state.photoFile;
  meta.innerHTML = `
    <div class="row"><span>Bestand</span><b>${escHtml(f ? f.name : 'foto')}</b></div>
    <div class="row"><span>Grootte</span><b>${escHtml(f ? (f.size/1024/1024).toFixed(2) : '?')} MB</b></div>
    <div class="row"><span>Type</span><b>${escHtml(f ? f.type : '—')}</b></div>`;
  wrap.style.display = '';
  document.getElementById('dropTitle').textContent = 'Foto klaar — klik om te vervangen';
  document.getElementById('dropHint').textContent = state.photoFile ? state.photoFile.name : '';
  const genBtn = document.getElementById('genJson'); if (genBtn) genBtn.disabled = false;
}

// ── Profile builder + JSON output ────────────────────────
// Schema volgt de briefing exact: mode='free_selection', selected_products
// met floor/window keys, custom_furniture, room_photo. Voor raamdecor breiden
// we naar een array uit zodat combinaties (Inbetween + Duette) gerepresenteerd
// kunnen worden — een single-product klant krijgt gewoon een lijst van 1.
function buildProfile() {
  const floor = state.selectedFloor ? {
    id: state.selectedFloor.id,
    pattern: state.selectedFloor.pattern,
    material: state.selectedFloor.material,
    texture_map: state.selectedFloor.texture_map,
  } : null;

  const window = state.selectedWindows.length > 0 ? state.selectedWindows.map(w => ({
    id: w.id,
    product_type: w.product_type,
    mount: state.windowContext.frame_material === 'kunststof' || state.windowContext.frame_material === 'alu'
      ? 'clamp_on_frame'
      : 'wall_mount',
    texture_map: w.texture_map,
  })) : [];

  const custom_furniture = state.furniture
    .filter(f => f.type || f.l || f.w || f.h || f.photoUrl)
    .map(f => ({
      id: f.id,
      type: f.type,
      dimensions: [parseInt(f.l,10) || 0, parseInt(f.w,10) || 0, parseInt(f.h,10) || 0],
      image_url: f.photoUrl || null,
    }));

  // Plattegrond — alleen aanwezig als de klant er één geüpload heeft.
  const floor_plan = state.floorPlanFile ? {
    filename: state.floorPlanFile.name,
    mime_type: state.floorPlanFile.type,
    size_bytes: state.floorPlanFile.size,
    data_url: state.floorPlanDataUrl,
  } : null;

  return {
    mode: 'free_selection',
    project_scope: [...state.scope],
    selected_products: { floor, window },
    window_context: { ...state.windowContext },
    custom_furniture,
    floor_plan,
    room_photo: state.photoDataUrl,
    validation_notices: validateCart().map(n => ({ icon: n.icon, message: n.text })),
    meta: {
      floor_count:  state.selectedFloor ? 1 : 0,
      window_count: state.selectedWindows.length,
      furniture_count: custom_furniture.length,
      has_floor_plan: !!floor_plan,
      generated_at: new Date().toISOString(),
    },
  };
}

function showJson(profile) {
  const wrap = document.getElementById('jsonWrap');
  const out  = document.getElementById('jsonOut');
  // Truncate room_photo + floor_plan.data_url voor leesbaarheid op het scherm.
  const display = JSON.parse(JSON.stringify(profile));
  if (display.room_photo && display.room_photo.length > 100) {
    const full = display.room_photo;
    display.room_photo = `${full.slice(0, 60)}…[+${full.length - 60} bytes base64]`;
  }
  if (display.floor_plan && display.floor_plan.data_url && display.floor_plan.data_url.length > 100) {
    const full = display.floor_plan.data_url;
    display.floor_plan.data_url = `${full.slice(0, 60)}…[+${full.length - 60} bytes base64]`;
  }
  out.innerHTML = highlight(JSON.stringify(display, null, 2));
  wrap.style.display = '';
  document.getElementById('copyJson').onclick     = () => copyJson(profile);
  document.getElementById('downloadJson').onclick = () => downloadJson(profile);
  document.getElementById('resetAll').onclick     = resetAll;
  wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function highlight(str) {
  return escHtml(str)
    .replace(/(&quot;[^&]*?&quot;)(\s*:)/g, '<span class="k">$1</span>$2')
    .replace(/:\s*(&quot;[^&]*?&quot;)/g, ': <span class="s">$1</span>')
    .replace(/:\s*(true|false|null)/g, ': <span class="b">$1</span>')
    .replace(/:\s*(-?\d+(\.\d+)?)/g, ': <span class="n">$1</span>');
}

function copyJson(profile) {
  const text = JSON.stringify(profile, null, 2);
  navigator.clipboard.writeText(text).then(() => showToast('Gekopieerd ✓')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('Gekopieerd ✓');
  });
}
function downloadJson(profile) {
  const text = JSON.stringify(profile, null, 2);
  const blob = new Blob([text], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `free_selection_${(profile.selected_products.floor?.id || 'noflr')}_${(profile.selected_products.window[0]?.id || 'nowin')}.json`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function showToast(msg = 'Gekopieerd ✓') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tid); t._tid = setTimeout(() => t.classList.remove('show'), 1400);
}

// ── Navigation ──────────────────────────────────────────
function gotoStep(n) {
  if (n > 1 && state.scope.length === 0) n = 1;
  state.step = n;
  renderProgress();
  if (n === 1) renderStep1();
  if (n === 2) renderStep2();
  if (n === 3) renderStep3();
  if (n === 4) renderStep4();
  renderCart();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetAll() {
  state.step = 1;
  state.scope = [];
  state.furniture = [];
  state.selectedFloor = null;
  state.selectedWindows = [];
  state.filters.floor = { material: '', pattern: '' };
  state.filters.window.goals = [];
  state.activeTab = null;
  state.photoFile = state.photoDataUrl = null;
  state.floorPlanFile = state.floorPlanDataUrl = null;
  renderPlanUpload();
  gotoStep(1);
}

// ── Init ───────────────────────────────────────────────
setupPlanUpload();
gotoStep(1);
</script>
